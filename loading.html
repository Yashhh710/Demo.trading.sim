<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto & Stock Candlestick Chart</title>
  <style>
    /* From Uiverse.io by bilal_9731 - Modified for realistic financial colors */ 
    body {
      background-color: #000000; /* Dark background common in trading platforms */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .candle-wrapper {
      display: flex;
      justify-content: center;
      padding: 20px;
      background: #00000000;
    }

    .candle-chart {
      display: flex;
      align-items: flex-end;
      height: 80px;
      gap: 4px;
    }

    .candle {
      width: 6px;
      height: 110%;
      position: relative;
      animation: fade 2.6s infinite ease-in-out;
    }

    /* Target the body (box) of each candle */
    .candle::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      background: var(--color);
      border: 1px solid var(--color);
      bottom: var(--b);
      height: var(--h);
    }

    /* Target the wick (shadow lines) of each candle */
    .candle::before {
      content: "";
      position: absolute;
      left: 50%; /* Adjusted to perfectly center the 1px wick on a 6px body */
      transform: translateX(-50%);
      width: 1px;
      background: var(--color);
      bottom: var(--wb);
      height: var(--wh);
    }

    /* Define trading colors */
    :root {
      --green: #22c55e;
      --red: #ef4444;
    }

    /* Individual candle properties with custom color variables applied */
    .candle:nth-child(1) {
      --color: var(--green);
      --b: 7.1%;
      --h: 18.93%;
      --wb: 0%;
      --wh: 31.95%;
      animation-delay: 0s;
    }
    .candle:nth-child(2) {
      --color: var(--green);
      --b: 26.04%;
      --h: 2.37%;
      --wb: 19.41%;
      --wh: 14.91%;
      animation-delay: 0.065s;
    }
    .candle:nth-child(3) {
      --color: var(--green);
      --b: 28.64%;
      --h: 4.5%;
      --wb: 16.92%;
      --wh: 21.66%;
      animation-delay: 0.13s;
    }
    .candle:nth-child(4) {
      --color: var(--green);
      --b: 31.42%;
      --h: 3.43%;
      --wb: 19.76%;
      --wh: 27.93%;
      animation-delay: 0.195s;
    }
    .candle:nth-child(5) {
      --color: var(--green);
      --b: 31.42%;
      --h: 15.44%;
      --wb: 27.43%;
      --wh: 28.07%;
      animation-delay: 0.26s;
    }
    .candle:nth-child(6) {
      --color: var(--green);
      --b: 46.54%;
      --h: 0.28%;
      --wb: 43.43%;
      --wh: 24.38%;
      animation-delay: 0.325s;
    }
    .candle:nth-child(7) {
      --color: var(--red);
      --b: 35.86%;
      --h: 8.7%;
      --wb: 29.7%;
      --wh: 24.5%;
      animation-delay: 0.39s;
    }
    .candle:nth-child(8) {
      --color: var(--red);
      --b: 11.67%;
      --h: 24.19%;
      --wb: 5.33%;
      --wh: 31.83%;
      animation-delay: 0.455s;
    }
    .candle:nth-child(9) {
      --color: var(--green);
      --b: 11.83%;
      --h: 15.1%;
      --wb: 7.93%;
      --wh: 24.97%;
      animation-delay: 0.52s;
    }
    .candle:nth-child(10) {
      --color: var(--green);
      --b: 27.81%;
      --h: 12.04%;
      --wb: 27.69%;
      --wh: 28.17%;
      animation-delay: 0.585s;
    }
    .candle:nth-child(11) {
      --color: var(--green);
      --b: 39.85%;
      --h: 28.25%;
      --wb: 39.53%;
      --wh: 28.58%;
      animation-delay: 0.65s;
    }
    .candle:nth-child(12) {
      --color: var(--green);
      --b: 70.8%;
      --h: 6.27%;
      --wb: 60.96%;
      --wh: 24.84%;
      animation-delay: 0.715s;
    }
    .candle:nth-child(13) {
      --color: var(--green);
      --b: 75.8%;
      --h: 2.71%;
      --wb: 68.38%;
      --wh: 31.62%;
      animation-delay: 0.78s;
    }
    .candle:nth-child(14) {
      --color: var(--red);
      --b: 67.23%;
      --h: 8.71%;
      --wb: 64.8%;
      --wh: 24.97%;
      animation-delay: 0.845s;
    }
    .candle:nth-child(15) {
      --color: var(--green);
      --b: 67.81%;
      --h: 7.85%;
      --wb: 57.54%;
      --wh: 27.55%;
      animation-delay: 0.91s;
    }
    .candle:nth-child(16) {
      --color: var(--green);
      --b: 70.08%;
      --h: 6.14%;
      --wb: 55.68%;
      --wh: 21.83%;
      animation-delay: 0.975s;
    }
    .candle:nth-child(17) {
      --color: var(--red);
      --b: 66.39%;
      --h: 3.69%;
      --wb: 58.11%;
      --wh: 26.11%;
      animation-delay: 1.04s;
    }
    .candle:nth-child(18) {
      --color: var(--red);
      --b: 64.8%;
      --h: 9.78%;
      --wb: 45.47%;
      --wh: 29.61%;
      animation-delay: 1.105s;
    }

    @keyframes fade {
      0% {
        opacity: 0;
        transform: scaleY(0);
      }
      10% {
        opacity: 1;
        transform: scaleY(1.3);
      }
      50% {
        opacity: 1;
        transform: scaleY(1);
      }
      70% {
        opacity: 0;
        transform: scaleY(1.3);
      }
      100% {
        opacity: 0;
        transform: scaleY(0);
      }
    }
  </style>
</head>
<body>

  <div class="candle-wrapper">
    <div class="candle-chart">
